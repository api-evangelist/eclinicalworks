apis:
  - aid: eclinicalworks:eclinicalworks-fhir-api
    name: eClinicalWorks FHIR API
    description: Provider-centric and backend/bulk FHIR APIs for integrating with
      eClinicalWorks EHR. Supports SMART on FHIR EHR Launch, Standalone Launch, Backend
      Services, and CDS Hooks. Enables access to clinical data, scheduling, patient
      demographics, results, and bulk data export for population health workflows.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://fhir.eclinicalworks.com/ecwopendev/
    baseURL: https://fhir.eclinicalworks.com
    tags:
      - FHIR
      - EHR
      - Clinical Data
      - Scheduling
      - Bulk Data
      - Provider
      - Backend Services
    properties:
      - type: Documentation
        url: https://fhir.eclinicalworks.com/ecwopendev/documentation/getting-started
      - type: Authentication
        url: https://fhir.eclinicalworks.com/ecwopendev/documentation/getting-started
  - aid: eclinicalworks:healow-fhir-api
    name: healow Patient-Centric FHIR API
    description: Patient-facing FHIR APIs accessible via the healow developer portal.
      Enables third-party applications to connect with the healow network for clinical
      data, scheduling, and remote patient monitoring integrations. Supports Clinical
      API, Scheduling API, and RPM Vendor API.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://connect4.healow.com/apps/jsp/dev/signIn.jsp
    baseURL: https://connect4.healow.com
    tags:
      - FHIR
      - Patient
      - Scheduling
      - Clinical
      - Remote Patient Monitoring
      - healow
    properties:
      - type: Documentation
        url: https://connect4.healow.com/apps/jsp/dev/signIn.jsp
      - type: Contact
        url: mailto:devsupport@healow.com
