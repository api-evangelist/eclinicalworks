aid: eclinicalworks
name: eClinicalWorks
description: eClinicalWorks is a cloud-based EHR and practice management platform
  serving more than 180,000 physicians and 850,000 medical professionals. It provides
  REST and FHIR-compliant APIs for accessing patient data, appointments, clinical
  notes, billing, and health information exchange. Third-party developers can build
  patient-facing apps via the healow developer portal and provider-facing or backend
  service apps via the eClinicalWorks FHIR developer portal, using SMART on FHIR
  and OAuth 2.0 authentication.
